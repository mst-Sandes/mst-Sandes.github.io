<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>PWEB1 — Cap. 05 — AT03 — Matrícula Acadêmica</title>
</head>
<body>

<header>
    <h1>Formulário de Matrícula Acadêmica</h1>

    <p>
        <a href="../index.html">← Voltar para a página principal</a>
    </p>
</header>

<main>

<p>* Campos obrigatórios</p>

<form action="https://httpbin.org/post" method="post">

    <fieldset>
        <legend>Dados Pessoais</legend>

        <div>
            <label for="nome">Nome completo *</label>
            <input
                type="text"
                id="nome"
                name="nome"
                required
                minlength="5"
                maxlength="100"
            />
        </div>

        <br>

        <div>
            <label for="cpf">CPF *</label>
            <input
                type="text"
                id="cpf"
                name="cpf"
                required
                pattern="\d{3}\.\d{3}\.\d{3}-\d{2}"
                placeholder="000.000.000-00"
                title="CPF no formato 000.000.000-00"
            />
        </div>

        <br>

        <div>
            <label for="telefone">Telefone</label>
            <input
                type="tel"
                id="telefone"
                name="telefone"
                pattern="\(\d{2}\)\s\d{4,5}-\d{4}"
                placeholder="(82) 99999-9999"
            />
        </div>

        <br>

        <div>
            <label for="email">E-mail *</label>
            <input
                type="email"
                id="email"
                name="email"
                required
            />
        </div>
    </fieldset>

    <br>

    <fieldset>
        <legend>Dados Acadêmicos</legend>

        <div>
            <label for="curso">Curso *</label>

            <select id="curso" name="curso" required>
                <option value="">Selecione um curso</option>

                <optgroup label="Computação">
                    <option value="si">Sistemas de Informação</option>
                    <option value="cc">Ciência da Computação</option>
                    <option value="ec">Engenharia da Computação</option>
                </optgroup>

                <optgroup label="Gestão">
                    <option value="adm">Administração</option>
                    <option value="contabeis">Ciências Contábeis</option>
                </optgroup>
            </select>
        </div>

        <br>

        <fieldset>
            <legend>Período</legend>

            <input type="radio" id="manha" name="periodo" value="manha" />
            <label for="manha">Manhã</label>

            <br>

            <input type="radio" id="tarde" name="periodo" value="tarde" />
            <label for="tarde">Tarde</label>

            <br>

            <input type="radio" id="noite" name="periodo" value="noite" />
            <label for="noite">Noite</label>
        </fieldset>

        <br>

        <div>
            <label for="ano_ingresso">Ano de ingresso *</label>
            <input
                type="number"
                id="ano_ingresso"
                name="ano_ingresso"
                min="2025"
                max="2030"
                required
            />
        </div>
    </fieldset>

    <br>

    <fieldset>
        <legend>Áreas de Interesse</legend>

        <input type="checkbox" id="web" name="interesses[]" value="web" />
        <label for="web">Desenvolvimento Web</label>

        <br>

        <input type="checkbox" id="bd" name="interesses[]" value="bd" />
        <label for="bd">Banco de Dados</label>

        <br>

        <input type="checkbox" id="ia" name="interesses[]" value="ia" />
        <label for="ia">Inteligência Artificial</label>

        <br>

        <input type="checkbox" id="seguranca" name="interesses[]" value="seguranca" />
        <label for="seguranca">Segurança da Informação</label>

        <br>

        <input type="checkbox" id="infra" name="interesses[]" value="infra" />
        <label for="infra">Infraestrutura</label>
    </fieldset>

    <br>

    <button type="submit">
        Solicitar matrícula
    </button>

    <button type="reset">
        Limpar formulário
    </button>

</form>

</main>

</body>
</html>
